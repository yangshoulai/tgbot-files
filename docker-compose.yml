services:
  tgbot-files:
    image: "${IMAGE_NAME:-ghcr.io/yangshoulai/tgbot-files:latest}"
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - aria2
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
    environment:
      HOST: "0.0.0.0"
      PORT: "8787"
      SQLITE_DB_PATH: "/data/tgbot-files.sqlite"
      PUBLIC_BASE_URL: "http://localhost:8787"
      MAX_FILE_BYTES: "20971520"
      STALE_MULTIPART_UPLOAD_TTL_HOURS: "24"
      CLEANUP_INTERVAL_MINUTES: "360"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_STORAGE_CHAT_ID: "${TELEGRAM_STORAGE_CHAT_ID}"
      LINK_SIGNING_SECRET: "${LINK_SIGNING_SECRET}"
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_SESSION_SECRET: "${ADMIN_SESSION_SECRET}"
      TG_CHANNEL_SECRET: "${TG_CHANNEL_SECRET:-}"
      ARIA2_RPC_URL: "${ARIA2_RPC_URL:-http://aria2:6800/jsonrpc}"
      ARIA2_RPC_SECRET: "${ARIA2_RPC_SECRET:?ARIA2_RPC_SECRET is required}"
      ARIA2_DOWNLOAD_DIR: "${ARIA2_DOWNLOAD_DIR:-/data/aria2/downloads}"
      ARIA2_METADATA_TIMEOUT_SECONDS: "${ARIA2_METADATA_TIMEOUT_SECONDS:-30}"
      ARIA2_DOWNLOAD_MAX_BYTES: "${ARIA2_DOWNLOAD_MAX_BYTES:-21474836480}"
      ARIA2_DOWNLOAD_MIN_FREE_BYTES: "${ARIA2_DOWNLOAD_MIN_FREE_BYTES:-5368709120}"
      ARIA2_DOWNLOAD_RETENTION_HOURS: "${ARIA2_DOWNLOAD_RETENTION_HOURS:-24}"
      ARIA2_BT_TRACKERS: "${ARIA2_BT_TRACKERS:-}"
      ARIA2_SPLIT: "${ARIA2_SPLIT:-16}"
      ARIA2_MAX_CONNECTION_PER_SERVER: "${ARIA2_MAX_CONNECTION_PER_SERVER:-16}"
      ARIA2_MIN_SPLIT_SIZE: "${ARIA2_MIN_SPLIT_SIZE:-1M}"
      ARIA2_BT_MAX_PEERS: "${ARIA2_BT_MAX_PEERS:-128}"

  aria2:
    build:
      context: .
      dockerfile: Dockerfile.aria2
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    command:
      - "--enable-rpc=true"
      - "--rpc-listen-all=true"
      - "--rpc-listen-port=6800"
      - "--rpc-secret=${ARIA2_RPC_SECRET:?ARIA2_RPC_SECRET is required}"
      - "--dir=/data/aria2/downloads"
      - "--save-session=/data/aria2/session.txt"
      - "--input-file=/data/aria2/session.txt"
      - "--save-session-interval=60"
      - "--force-save=true"
      - "--bt-save-metadata=true"
      - "--listen-port=6881"
      - "--enable-dht=true"
      - "--enable-dht6=false"
      - "--dht-listen-port=6881"
      - "--dht-file-path=/data/aria2/dht.dat"
      - "--dht-file-path6=/data/aria2/dht6.dat"
      - "--enable-peer-exchange=true"
      - "--bt-enable-lpd=true"
      - "--follow-torrent=mem"
      - "--bt-max-open-files=100"
      - "--bt-max-peers=${ARIA2_BT_MAX_PEERS:-128}"
      - "--bt-request-peer-speed-limit=100K"
      - "--bt-stop-timeout=900"
      - "--peer-id-prefix=-qB4500-"
      - "--user-agent=qBittorrent/4.5.0"
      - "--peer-agent=qBittorrent/4.5.0"
      - "--bt-tracker=${ARIA2_BT_TRACKERS:-}"
      - "--bt-tracker-connect-timeout=10"
      - "--bt-tracker-timeout=10"
      - "--seed-time=0"
      - "--max-overall-upload-limit=64K"
      - "--split=${ARIA2_SPLIT:-16}"
      - "--max-connection-per-server=${ARIA2_MAX_CONNECTION_PER_SERVER:-16}"
      - "--min-split-size=${ARIA2_MIN_SPLIT_SIZE:-1M}"
      - "--max-concurrent-downloads=5"
      - "--max-overall-download-limit=0"
      - "--disk-cache=64M"
      - "--continue=true"
      - "--always-resume=true"
      - "--check-integrity=true"
